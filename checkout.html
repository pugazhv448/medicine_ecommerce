<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - MediQuick</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">
            <i class="fas fa-notes-medical"></i> MediQuick
        </a>
        <div class="menu-toggle" id="mobile-menu">
            <i class="fas fa-bars"></i>
        </div>
        <div class="nav-links" id="nav-links">
            <a href="index.html">Home</a>
            <a href="products.html">Medicines</a>
            <a href="about.html">About Drones</a>
            <a href="track.html">Track Order</a>
            <a href="contact.html">Contact</a>
        </div>
        <div class="nav-icons">
            <div id="theme-toggle" class="theme-toggle"><i class="fas fa-moon"></i></div>
            <div id="login-link"></div>
            <a href="cart.html" class="cart-icon-container">
                <i class="fas fa-shopping-cart" style="font-size: 1.5rem;"></i>
                <span class="cart-count">0</span>
            </a>
        </div>
    </nav>

    <div class="container">
        <h2>Secure Checkout</h2>
        <div class="checkout-container">
            <div class="checkout-form-section">
                <h3>Shipping Information</h3>
                <form id="checkout-form">
                    <div class="form-group">
                        <label for="checkout-name">Full Name</label>
                        <input type="text" id="checkout-name" class="form-control" required placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label for="checkout-email">Email Address</label>
                        <input type="email" id="checkout-email" class="form-control" required placeholder="john@example.com">
                    </div>
                    <div class="form-group">
                        <label for="checkout-phone">Phone Number</label>
                        <input type="tel" id="checkout-phone" class="form-control" required placeholder="+1 234 567 8900">
                    </div>
                    <div class="form-group">
                        <label for="checkout-address">Delivery Address</label>
                        <textarea id="checkout-address" class="form-control" rows="3" required placeholder="123 Health Ave, Medical City..."></textarea>
                    </div>
                    
                    <h3 style="margin-top: 2rem;">Payment Method</h3>
                    <div class="form-group">
                        <div style="border: 1px solid var(--border-color); padding: 1rem; border-radius: 8px; margin-bottom: 1rem;">
                            <label style="margin: 0; font-weight: normal; cursor: pointer; display: flex; align-items: center; gap: 0.5rem;">
                                <input type="radio" name="payment" checked>
                                Credit / Debit Card (Simulated)
                            </label>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1.1rem; padding: 1rem;">Place Order & Pay</button>
                </form>
            </div>
            
            <div class="checkout-summary-section">
                <div id="checkout-summary" class="cart-summary">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 MediQuick Drone Delivery. All rights reserved.</p>
    </footer>

    <div id="toast-container"></div>
    <div id="spinner-overlay">
        <div class="spinner"></div>
    </div>

    <script src="js/products.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
