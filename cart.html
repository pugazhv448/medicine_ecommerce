<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - MediQuick</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">
            <i class="fas fa-notes-medical"></i> MediQuick
        </a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="products.html">Medicines</a>
            <a href="about.html">About Drones</a>
            <a href="track.html">Track Order</a>
            <a href="contact.html">Contact</a>
        </div>
        <div class="nav-icons">
            <div id="theme-toggle" class="theme-toggle"><i class="fas fa-moon"></i></div>
            <div id="login-link"></div>
            <a href="cart.html" class="cart-icon-container">
                <i class="fas fa-shopping-cart" style="font-size: 1.5rem;"></i>
                <span class="cart-count">0</span>
            </a>
        </div>
    </nav>

    <div class="container">
        <h2 style="margin-bottom: 2rem;">Shopping Cart</h2>
        <div class="cart-container">
            <div id="cart-items" class="cart-items">
                <!-- Populated by JS -->
            </div>
            <div id="cart-summary" class="cart-summary" style="display: none;">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 MediQuick Drone Delivery. All rights reserved.</p>
    </footer>

    <div id="toast-container"></div>
    <div id="spinner-overlay">
        <div class="spinner"></div>
    </div>

    <script src="js/products.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
