<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Success - MediQuick</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">
            <i class="fas fa-notes-medical"></i> MediQuick
        </a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="products.html">Medicines</a>
            <a href="about.html">About Drones</a>
            <a href="track.html">Track Order</a>
            <a href="contact.html">Contact</a>
        </div>
        <div class="nav-icons">
            <div id="theme-toggle" class="theme-toggle"><i class="fas fa-moon"></i></div>
            <div id="login-link"></div>
            <a href="cart.html" class="cart-icon-container">
                <i class="fas fa-shopping-cart" style="font-size: 1.5rem;"></i>
                <span class="cart-count">0</span>
            </a>
        </div>
    </nav>

    <div class="container" style="text-align: center; max-width: 600px;">
        <i class="fas fa-check-circle" style="font-size: 5rem; color: var(--success-color); margin-bottom: 1.5rem; margin-top: 2rem;"></i>
        <h1 style="margin-bottom: 1rem;">Order Placed Successfully!</h1>
        <p style="font-size: 1.1rem; color: var(--text-light); margin-bottom: 2rem;">Thank you for your purchase. Your medicines will be delivered soon.</p>
        
        <div style="background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 2rem; text-align: left; margin-bottom: 2rem; box-shadow: var(--shadow);">
            <div id="order-details">
                <!-- Populated by JS -->
            </div>
        </div>

        <div style="margin-top: 2rem;">
            <a href="track.html" class="btn btn-primary" style="padding: 1rem 2rem; margin-right: 1rem;"><i class="fas fa-plane"></i> Track Your Drone</a>
            <a href="index.html" class="btn" style="padding: 1rem 2rem; border: 1px solid var(--primary-color); color: var(--primary-color);">Return to Home</a>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 MediQuick Drone Delivery. All rights reserved.</p>
    </footer>

    <div id="toast-container"></div>
    <div id="spinner-overlay">
        <div class="spinner"></div>
    </div>

    <script src="js/products.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
