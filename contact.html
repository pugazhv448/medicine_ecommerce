<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - MediQuick</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">
            <i class="fas fa-notes-medical"></i> MediQuick
        </a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="products.html">Medicines</a>
            <a href="about.html">About Drones</a>
            <a href="track.html">Track Order</a>
            <a href="contact.html">Contact</a>
        </div>
        <div class="nav-icons">
            <div id="theme-toggle" class="theme-toggle"><i class="fas fa-moon"></i></div>
            <div id="login-link"></div>
            <a href="cart.html" class="cart-icon-container">
                <i class="fas fa-shopping-cart" style="font-size: 1.5rem;"></i>
                <span class="cart-count">0</span>
            </a>
        </div>
    </nav>

    <div class="container">
        <div class="auth-container" style="max-width: 600px; margin: 2rem auto;">
            <h2 style="text-align: center; margin-bottom: 2rem;">Get in Touch</h2>
            <form id="contact-form">
                <div class="form-group">
                    <label>Your Name</label>
                    <input type="text" class="form-control" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" class="form-control" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label>Subject</label>
                    <input type="text" class="form-control" required placeholder="Drone Delivery Issue">
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea class="form-control" rows="5" required placeholder="How can we help you?"></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 MediQuick Drone Delivery. All rights reserved.</p>
    </footer>

    <div id="toast-container"></div>
    <div id="spinner-overlay">
        <div class="spinner"></div>
    </div>

    <script src="js/products.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
